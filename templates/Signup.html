{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup - Anime World</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(45deg, #0f2027, #2c5364);
            font-family: Arial, sans-serif;
            color: white;
        }

        .signup-box {
            width: 400px;
            margin: 80px auto;
            padding: 30px;
            background: rgba(0,0,0,0.85);
            border-radius: 12px;
            text-align: center;
        }

        .signup-box h2 {
            margin-bottom: 20px;
        }

        .signup-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }

        .anime-btn {
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            border: none;
            padding: 10px;
            width: 100%;
            color: white;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .anime-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff00cc;
        }

        a {
            color: #00d4ff;
        }
    </style>
</head>

<body>

<div class="signup-box">
    <h2>🎌 Create Account</h2>

    <form method="POST" action ="{% url 'signup_view' %}">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password1" placeholder="Password" required>
        <input type="password" name="password2" placeholder="Confirm Password" required>

        <button type="submit" class="anime-btn">Sign Up</button>
    </form>

    <!-- Error message -->
    {% if error %}
        <p style="color:red; margin-top:10px;">{{ error }}</p>
    {% endif %}

    <p class="mt-3">
        Already have an account?
       <a href="{% url 'login' %}">Login</a>
    </p>

    <!-- Back Button -->
    <div class="mt-3">
        <a href="{% url 'home' %}" class="btn btn-outline-light">⬅ Back to Home</a>
    </div>
</div>

</body>
</html>
