<!DOCTYPE html>
<html>
<head>
    <title>Search</title>
</head>
<body>

<h2>Search Results</h2>

{% if query %}
<p>You searched for: <b>{{ query }}</b></p>
{% endif %}

{% if results %}
    {% for anime in results %}
        <div>
            <h3>{{ anime.title }}</h3>
        </div>
    {% endfor %}
{% else %}
    <p>No results found</p>
{% endif %}

</body>
</html>
