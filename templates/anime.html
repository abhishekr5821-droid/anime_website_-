{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime World</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f0f1a;
            color: white;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background: #111;
        }

        .anime-card {
            background: #1c1c2b;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
        }

        .anime-card:hover {
            transform: scale(1.05);
        }

        .anime-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .anime-title {
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        .video-box {
            margin-top: 20px;
            background: #111;
            padding: 20px;
            border-radius: 10px;
        }

        iframe {
            width: 100%;
            height: 450px;
            border-radius: 10px;
        }

        .section-title {
            margin: 20px 0;
            text-align: center;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="#">🎌 Anime World</a>
    </div>
</nav>

<!-- VIDEO PLAYER -->
<div class="container video-box">
    <h3 class="text-center">Now Watching</h3>

    <iframe id="animeVideo"
        src="https://www.youtube.com/embed/1G4isv_Fylg"
        allowfullscreen>
    </iframe>

    <p class="text-center mt-2">Click any anime below to watch</p>
</div>

<!-- ANIME LIST -->
<div class="container">
    <h2 class="section-title">🔥 Popular Anime</h2>

    <div class="row">

        <!-- Anime 1 -->
        <div class="col-md-4 mb-4">
            <div class="anime-card" onclick="playVideo('https://www.youtube.com/embed/1G4isv_Fylg')">
                <img src="https://img.youtube.com/vi/1G4isv_Fylg/maxresdefault.jpg">
                <div class="anime-title">Naruto</div>
            </div>
        </div>

        <!-- Anime 2 -->
        <div class="col-md-4 mb-4">
            <div class="anime-card" onclick="playVideo('https://www.youtube.com/embed/dQw4w9WgXcQ')">
                <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/maxresdefault.jpg">
                <div class="anime-title">Attack on Titan</div>
            </div>
        </div>

        <!-- Anime 3 (LOCAL VIDEO EXAMPLE) -->
       <div class="col-md-4 mb-4">
    <div class="anime-card"
       <video controls>
    <source src="{% static 'videos/solo_leveling_ep1.mp4' %}" type="video/mp4">
</video>
        <img src="https://img.youtube.com/vi/ysz5S6PUM-U/maxresdefault.jpg">
        <div class="anime-title">Solo Leveling</div>
    </div>
</div>

    </div>
</div>

<!-- LOCAL VIDEO PLAYER (hidden by default) -->
<video id="videoPlayer" controls style="width:100%; display:none; margin-top:20px;"></video>

<!-- BACK BUTTON -->
<div class="container mt-3">
    <a href="{% url 'home' %}" class="btn btn-outline-light">
        ⬅ Back to Home
    </a>
</div>

<script>
function playVideo(url, isLocal=false) {

    const iframe = document.getElementById("animeVideo");
    const video = document.getElementById("videoPlayer");

    if (isLocal) {
        iframe.style.display = "none";
        video.style.display = "block";
        video.src = url;
        video.play();
    } else {
        video.style.display = "none";
        iframe.style.display = "block";
        iframe.src = url;
    }
}
</script>
<script>
function playVideo(url, isLocal=false) {

    const iframe = document.getElementById("animeVideo");
    const video = document.getElementById("videoPlayer");

    if (isLocal) {
        iframe.style.display = "none";
        iframe.src = "";

        video.style.display = "block";
        video.src = url;
        video.load();
        video.play();

    } else {
        video.pause();
        video.style.display = "none";
        video.src = "";

        iframe.style.display = "block";
        iframe.src = url;
    }
}
</script>
</body>
</html>
